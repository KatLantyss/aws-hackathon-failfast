service: ship-analysis-api

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  memorySize: 1024
  timeout: 29

  environment:
    VESSEL_TABLE: ship-analysis-dev-vessel-data
    MAINT_TABLE:  ship-analysis-dev-maintenance-events
    FLEET_SUMMARY_TABLE: ship-analysis-dev-fleet-summary

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
          Resource:
            - arn:aws:dynamodb:us-east-1:151274905459:table/ship-analysis-dev-vessel-data
            - arn:aws:dynamodb:us-east-1:151274905459:table/ship-analysis-dev-maintenance-events
            - arn:aws:dynamodb:us-east-1:151274905459:table/ship-analysis-dev-fleet-summary

package:
  individually: false
  patterns:
    - 'handler.py'
    - 'model/**'
    - 'vendor/**'
    - '!node_modules/**'
    - '!.serverless/**'
    - '!__pycache__/**'
    - '!*.pyc'
    - '!requirements.txt'
    - '!package.json'
    - '!package-lock.json'
    - '!test_*.py'
    - '!inspect_model.py'
    - '!explore_predict.py'

functions:
  api:
    handler: handler.main
    events:
      - http:
          path:   health
          method: get
          cors:   true
      - http:
          path:   api/v1/vessels
          method: get
          cors:   true
      - http:
          path:   api/v1/vessels/{vessel_id}
          method: get
          cors:   true
      - http:
          path:   api/v1/vessels/{vessel_id}/noon-reports
          method: get
          cors:   true
      - http:
          path:   api/v1/vessels/{vessel_id}/speed-loss
          method: get
          cors:   true
      - http:
          path:   api/v1/vessels/{vessel_id}/speed-loss-attribution
          method: get
          cors:   true
      - http:
          path:   api/v1/vessels/{vessel_id}/maintenance-events
          method: get
          cors:   true
      - http:
          path:   api/v1/vessels/{vessel_id}/maintenance-recommendation
          method: get
          cors:   true
      - http:
          path:   api/v1/fleet/ranking
          method: get
          cors:   true
      - http:
          path:   api/v1/predict/fuel-consumption
          method: post
          cors:   true
