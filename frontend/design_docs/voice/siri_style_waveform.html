<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">當使用者說話時,畫面中會出現隨音量變化的橫向波浪線條,類似語音助理的聲波動畫</h2>
<div style="display:flex;flex-direction:column;align-items:center;gap:1.25rem;padding:2rem 0;">
  <div style="width:100%;max-width:520px;height:160px;">
    <canvas id="wave-canvas" width="520" height="160" style="width:100%;height:160px;display:block;"></canvas>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <button id="mic-btn" style="display:flex;align-items:center;gap:6px;padding:8px 18px;">
      <i class="ti ti-microphone" aria-hidden="true" style="font-size:16px;"></i>
      <span id="mic-label">開始聆聽</span>
    </button>
    <span id="status-text" style="font-size:13px;color:var(--text-secondary);">尚未啟用麥克風</span>
  </div>
</div>
<script>
(function(){
  const canvas = document.getElementById('wave-canvas');
  const ctx = canvas.getContext('2d');
  const btn = document.getElementById('mic-btn');
  const label = document.getElementById('mic-label');
  const status = document.getElementById('status-text');
  const W = canvas.width, H = canvas.height, CY = H/2;

  let audioCtx, analyser, source, stream, rafId, idleRaf;
  let running = false;
  const lines = 3;
  const lineColors = [
    [29,158,117],
    [127,119,221],
    [216,90,48]
  ];
  let smooth = [0,0,0];
  let phase = 0;

  function drawLine(color, amp, freq, offset, alpha, width){
    ctx.beginPath();
    for(let x=0;x<=W;x+=4){
      const t = x/W;
      const envelope = Math.sin(Math.PI*t);
      const y = CY + Math.sin(t*Math.PI*freq + phase + offset) * amp * envelope;
      if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle = 'rgba('+color.join(',')+','+alpha+')';
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  function drawIdle(){
    ctx.clearRect(0,0,W,H);
    phase += 0.04;
    drawLine(lineColors[0], 6, 3.2, 0, 0.5, 2.2);
    drawLine(lineColors[1], 4, 4.1, 1.4, 0.35, 1.8);
    drawLine(lineColors[2], 3, 2.4, 2.8, 0.3, 1.6);
    idleRaf = requestAnimationFrame(drawIdle);
  }
  drawIdle();

  function draw(){
    if(!running) return;
    rafId = requestAnimationFrame(draw);
    const timeData = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(timeData);

    let sum = 0;
    for(let i=0;i<timeData.length;i++){
      const v = (timeData[i]-128)/128;
      sum += v*v;
    }
    const rms = Math.sqrt(sum/timeData.length);
    const target = Math.min(rms*3.2, 1);

    smooth[0] += (target - smooth[0])*0.25;
    smooth[1] += (target*0.8 - smooth[1])*0.18;
    smooth[2] += (target*0.6 - smooth[2])*0.12;

    ctx.clearRect(0,0,W,H);
    phase += 0.05 + smooth[0]*0.08;

    drawLine(lineColors[0], 6 + smooth[0]*46, 3.0, 0, 0.9, 2.6);
    drawLine(lineColors[1], 5 + smooth[1]*38, 3.8, 1.4, 0.55, 2);
    drawLine(lineColors[2], 4 + smooth[2]*30, 2.4, 2.8, 0.4, 1.6);
  }

  async function start(){
    try{
      status.textContent = '請求麥克風權限中';
      stream = await navigator.mediaDevices.getUserMedia({audio:true});
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;
      analyser.smoothingTimeConstant = 0.75;
      source.connect(analyser);
      running = true;
      cancelAnimationFrame(idleRaf);
      label.textContent = '停止聆聽';
      btn.querySelector('i').className = 'ti ti-microphone-off';
      status.textContent = '正在聆聽,說話試試看';
      draw();
    }catch(err){
      status.textContent = '無法取得麥克風權限,請確認瀏覽器設定';
    }
  }

  function stop(){
    running = false;
    cancelAnimationFrame(rafId);
    if(stream){ stream.getTracks().forEach(tr=>tr.stop()); }
    if(audioCtx){ audioCtx.close(); }
    label.textContent = '開始聆聽';
    btn.querySelector('i').className = 'ti ti-microphone';
    status.textContent = '已停止';
    drawIdle();
  }

  btn.addEventListener('click', function(){
    if(running){ stop(); } else { start(); }
  });
})();
</script>
